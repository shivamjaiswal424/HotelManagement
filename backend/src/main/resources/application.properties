spring.application.name=backend

server.port=8080

# ===============================
# PostgreSQL Datasource
# ===============================
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=jdbc:postgresql://localhost:5432/backend
spring.datasource.username=postgres
spring.datasource.password=@Shivam424


# ===============================
# JPA / Hibernate
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# Logging
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# Jackson (API date handling)
# ===============================
spring.jackson.time-zone=UTC

# ===============================
# JWT
# ===============================
jwt.secret=AnnapurnaBanquetsAndInnHotelPMSSecretKey2024!
jwt.expiration-ms=86400000

# ===============================
# Default admin credentials (override via env vars in Docker/AWS)
# ===============================
app.admin.username=admin
app.admin.password=admin123
app.admin.fullname=Hotel Administrator

# ===============================
# Demo Data Seeding
# Set to true ONCE to reset all rooms/reservations and load demo data.
# Change back to false after the first run to prevent data loss on restart.
# ===============================
app.seed.reset=false